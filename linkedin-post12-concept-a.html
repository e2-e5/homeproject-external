<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 628px; overflow: hidden; background: #0D0408; font-family: Arial, sans-serif; }
  #canvas { position: relative; width: 1200px; height: 628px; overflow: hidden; }
  #sky { position: absolute; inset: 0; z-index: 1; background: linear-gradient(to bottom, #0D0408 0%, #1F0810 25%, #3A0E18 55%, #4A1015 80%, #1A0508 100%); }
  #stars-layer { position: absolute; inset: 0; z-index: 2; }
  #meteor-svg { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  #trex-container { position: absolute; bottom: 0; left: -40px; width: 560px; height: 628px; overflow: hidden; z-index: 4; }
  #trex-img { filter: brightness(0.52) contrast(1.3) saturate(0.45) sepia(0.25); width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
  #trex-overlay1 { position: absolute; inset: 0; background: linear-gradient(130deg, transparent 20%, rgba(190,55,0,0.22) 65%, rgba(170,45,0,0.38) 100%); mix-blend-mode: overlay; }
  #trex-overlay2 { position: absolute; inset: 0; background: linear-gradient(to right, #0D0408 0%, #0D0408 15%, transparent 100%); }
  #trex-overlay3 { position: absolute; bottom: 0; left: 0; right: 0; height: 42%; background: linear-gradient(to top, #0D0408 0%, transparent 100%); }
  #trex-overlay4 { position: absolute; top: 0; right: 0; bottom: 0; width: 45%; background: linear-gradient(to left, rgba(30,8,14,0.96) 0%, rgba(30,8,14,0.5) 30%, transparent 100%); }
  #city-layer { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  #meteor-light { position: absolute; inset: 0; z-index: 6; pointer-events: none; background: radial-gradient(ellipse at 970px 72px, rgba(220,70,0,0.18) 0%, rgba(180,40,0,0.08) 40%, transparent 70%); }
  #text-block { position: absolute; top: 55px; right: 55px; text-align: right; z-index: 10; max-width: 520px; }
  #main-title { font-family: 'Arial Black', Arial, sans-serif; font-size: 80px; font-weight: 900; line-height: 1.0; color: #FFFFFF; text-transform: uppercase; letter-spacing: -1px; text-shadow: 0 0 40px rgba(255,100,0,0.9), 0 0 80px rgba(255,60,0,0.6), 2px 2px 0px rgba(0,0,0,0.8); }
  #sub-title { margin-top: 18px; font-size: 21px; color: #FFCCAA; line-height: 1.45; text-shadow: 0 0 20px rgba(200,80,0,0.5); }
  #brand { position: absolute; bottom: 28px; left: 28px; z-index: 20; }
  #brand-name { font-size: 18px; font-weight: 700; color: #FFFFFF; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255,120,0,0.6); }
  #brand-sub { font-size: 11px; color: rgba(255,200,150,0.75); margin-top: 4px; }
  #badge { position: absolute; bottom: 28px; right: 28px; z-index: 20; border: 1.5px solid #FF5500; background: rgba(20,5,5,0.85); box-shadow: 0 0 18px rgba(255,85,0,0.55); padding: 8px 16px; border-radius: 6px; }
  #badge-text { font-size: 14px; font-weight: 700; color: #FF7722; }
