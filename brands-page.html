<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наши бренды · Home Project</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@200;300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@200;300;400;500;600;700&family=Work+Sans:wght@300;400;500;600&family=EB+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #FFFFFF;
  font-family: 'Inter', sans-serif;
  color: #1A1A1A;
}

.page-header {
  text-align: center;
  padding: 64px 40px 48px;
}

.page-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 36px;
  font-weight: 400;
  color: #1A1A1A;
  margin-bottom: 12px;
  letter-spacing: 0.01em;
}

.page-subtitle {
  color: #AAAAAA;
  font-size: 15px;
  letter-spacing: 0.02em;
}

.brands-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: #E8E8E8;
  gap: 1px;
  border-top: 1px solid #E8E8E8;
  border-bottom: 1px solid #E8E8E8;
  max-width: 1080px;
  margin: 0 auto;
}

.brand-cell {
  padding: 44px 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #FFFFFF;
  transition: background 0.18s ease;
  min-height: 120px;
  cursor: pointer;
}

.brand-cell:hover {
  background: #F8F8F7;
}

.brand-logo {
  width: 100%;
  max-width: 200px;
  height: auto;
  display: block;
  overflow: visible;
  transition: opacity 0.18s ease;
}

.brand-cell:hover .brand-logo {
  opacity: 0.7;
}

@media (max-width: 640px) {
  .brands-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  .brand-cell {
    padding: 32px 24px;
    min-height: 90px;
  }
  .page-title { font-size: 28px; }
}
</style>
</head>
<body>

<div class="page-header">
  <h1 class="page-title">Наши бренды</h1>
  <p class="page-subtitle">15 европейских брендов премиальной техники для дома.</p>
</div>

<div class="brands-grid">

  <!-- De Dietrich -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="40" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" font-weight="500" letter-spacing="2" fill="#1A1A1A" text-anchor="middle">De Dietrich</text>
    </svg>
  </div>

  <!-- Schulthess -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="37" font-family="'Montserrat', Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="5.5" fill="#1A1A1A" text-anchor="middle">SCHULTHESS</text>
      <line x1="50" y1="44" x2="190" y2="44" stroke="#1A1A1A" stroke-width="0.6" opacity="0.2"/>
    </svg>
  </div>

  <!-- Brandt -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="43" font-family="'Montserrat', Arial, sans-serif" font-size="38" font-weight="700" fill="#1A1A1A" text-anchor="middle">Brandt</text>
    </svg>
  </div>

  <!-- Küppersbusch -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="38" font-family="'Raleway', Arial, sans-serif" font-size="16.5" font-weight="500" letter-spacing="0.8" fill="#1A1A1A" text-anchor="middle">Küppersbusch</text>
    </svg>
  </div>

  <!-- Salini -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="41" font-family="'Cormorant Garamond', Georgia, serif" font-size="30" font-weight="300" letter-spacing="9" fill="#1A1A1A" text-anchor="middle">SALINI</text>
    </svg>
  </div>

  <!-- Graude -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="40" font-family="'Montserrat', Arial, sans-serif" font-size="25" font-weight="600" letter-spacing="5" fill="#1A1A1A" text-anchor="middle">GRAUDE</text>
    </svg>
  </div>

  <!-- V-ZUG -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="46" font-family="'Montserrat', Arial, sans-serif" font-size="44" font-weight="800" fill="#1A1A1A" text-anchor="middle">V-ZUG</text>
    </svg>
  </div>

  <!-- SKS -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="45" font-family="'Montserrat', Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="8" fill="#1A1A1A" text-anchor="middle">SKS</text>
    </svg>
  </div>

  <!-- ILVE -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="44" font-family="'Raleway', Arial, sans-serif" font-size="38" font-weight="200" letter-spacing="14" fill="#1A1A1A" text-anchor="middle">ILVE</text>
    </svg>
  </div>

  <!-- BORA -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="47" font-family="'Montserrat', Arial, sans-serif" font-size="46" font-weight="900" letter-spacing="3" fill="#1A1A1A" text-anchor="middle">BORA</text>
    </svg>
  </div>

  <!-- Fhiaba -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="43" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-weight="400" letter-spacing="2" fill="#1A1A1A" text-anchor="middle">fhiaba</text>
    </svg>
  </div>

  <!-- Bertazzoni -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="37" font-family="'EB Garamond', Georgia, serif" font-size="21" font-weight="400" letter-spacing="2.5" fill="#1A1A1A" text-anchor="middle">BERTAZZONI</text>
      <line x1="28" y1="45" x2="212" y2="45" stroke="#1A1A1A" stroke-width="0.8" opacity="0.2"/>
    </svg>
  </div>

  <!-- Liebherr -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="38" font-family="'Montserrat', Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="0.5" fill="#1A1A1A" text-anchor="middle">Liebherr</text>
    </svg>
  </div>

  <!-- Paulmark -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="38" font-family="'Work Sans', Arial, sans-serif" font-size="20" font-weight="500" letter-spacing="4.5" fill="#1A1A1A" text-anchor="middle">PAULMARK</text>
    </svg>
  </div>

  <!-- Gaggenau -->
  <div class="brand-cell">
    <svg class="brand-logo" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <text x="120" y="38" font-family="'Raleway', Arial, sans-serif" font-size="21" font-weight="300" letter-spacing="7" fill="#1A1A1A" text-anchor="middle">GAGGENAU</text>
    </svg>
  </div>

</div>

</body>
</html>
