<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Калькулятор AI-экономии · Home Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f172a;
      --card:    #1e293b;
      --card2:   #243044;
      --border:  #334155;
      --accent:  #6366f1;
      --accent2: #818cf8;
      --green:   #10b981;
      --yellow:  #f59e0b;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --danger:  #ef4444;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 48px;
    }

    .header {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent2);
      text-transform: uppercase;
    }
    .timer-badge {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      color: var(--accent2);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
    }

    #app { width: 100%; max-width: 640px; }

    .progress-wrap { margin-bottom: 28px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 16px;
    }
    @media (min-width: 480px) { .card { padding: 36px 32px; } }

    .q-number {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 8px;
    }
    .q-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      line-height: 1.35;
    }
    @media (min-width: 480px) { .q-title { font-size: 22px; } }

    .options { display: grid; gap: 10px; }
    .options.grid-2 { grid-template-columns: 1fr 1fr; }

    .opt {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, transform 0.12s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 52px;
    }
    .opt:hover { border-color: var(--accent2); background: #2a3a58; }
    .opt:active { transform: scale(0.98); }
    .opt.selected { border-color: var(--accent); background: rgba(99,102,241,0.12); }
    .opt-radio {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s;
    }
    .opt.selected .opt-radio { border-color: var(--accent); }
    .opt-radio-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0; transform: scale(0);
      transition: opacity 0.18s, transform 0.18s;
    }
    .opt.selected .opt-radio-dot { opacity: 1; transform: scale(1); }
    .opt-label { font-size: 15px; font-weight: 500; color: var(--text); }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 14px;
    }
    select {
      width: 100%;
      padding: 14px 42px 14px 16px;
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px; font-family: inherit; font-weight: 500;
      appearance: none; cursor: pointer; outline: none;
      transition: border-color 0.18s;
    }
    select:focus { border-color: var(--accent); }
    select option { background: #1e293b; color: var(--text); }

    .btn-row { display: flex; gap: 12px; margin-top: 28px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 14px 24px; border-radius: 12px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: none;
      transition: opacity 0.18s, transform 0.12s, background 0.18s;
      min-height: 52px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; flex: 1; }
    .btn-primary:hover { background: #5558e8; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); padding: 14px 20px;
    }
    .btn-ghost:hover { border-color: var(--accent2); color: var(--text); }
    .btn-cta {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; width: 100%; font-size: 16px;
      padding: 18px 24px; border-radius: 14px; margin-top: 24px;
    }
    .btn-cta:hover { background: linear-gradient(135deg, #059669, #047857); }

    .field { margin-bottom: 16px; }
    label.field-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px; letter-spacing: 0.03em;
    }
    input[type="text"], input[type="email"] {
      width: 100%; padding: 14px 16px;
      background: var(--card2); border: 2px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 16px; font-family: inherit; outline: none;
      transition: border-color 0.18s;
    }
    input[type="text"]:focus, input[type="email"]:focus { border-color: var(--accent); }
    input[type="text"].error, input[type="email"].error { border-color: var(--danger); }
    .field-error { font-size: 12px; color: var(--danger); margin-top: 4px; display: none; }
    .field-error.visible { display: block; }

    .checkbox-row {
      display: flex; align-items: flex-start;
      gap: 10px; margin-top: 16px; cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px; height: 18px; flex-shrink: 0;
      accent-color: var(--accent); cursor: pointer; margin-top: 1px;
    }
    .checkbox-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .checkbox-text a { color: var(--accent2); text-decoration: none; }
    .checkbox-error { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
    .checkbox-error.visible { display: block; }

    .results-header { text-align: center; margin-bottom: 28px; }
    .results-header h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .results-header .sub { font-size: 13px; color: var(--muted); }

    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .metric {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; text-align: center;
    }
    .metric.highlight { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.08); }
    .metric.green-card { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.07); }
    .metric-icon { font-size: 22px; margin-bottom: 6px; }
    .metric-value { font-size: 24px; font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
    .metric-value.green { color: var(--green); }
    .metric-value.accent { color: var(--accent2); }
    .metric-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; line-height: 1.4; }

    .tariff-box {
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(99,102,241,0.05));
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 14px; padding: 20px; margin-bottom: 20px;
    }
    .tariff-name { font-size: 13px; font-weight: 700; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .tariff-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 12px; }
    .tariff-price { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
    .tariff-price .amount { font-size: 28px; font-weight: 800; color: var(--text); }
    .tariff-price .period { font-size: 13px; color: var(--muted); }
    .tariff-impl { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .tariff-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: rgba(99,102,241,0.15); color: var(--accent2); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }

    .pilot-banner {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    }
    .pilot-icon { font-size: 20px; }
    .pilot-text { font-size: 13px; color: var(--yellow); font-weight: 600; }
    .pilot-sub { font-size: 12px; color: var(--muted); font-weight: 400; }

    .disclaimer {
      font-size: 12px; color: var(--muted); text-align: center;
      line-height: 1.6; margin-bottom: 20px; padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px; border: 1px solid var(--border);
    }

    .level1-cta { border: 1px solid var(--border); border-radius: 14px; padding: 20px; text-align: center; }
    .level1-cta .cta-eyebrow { font-size: 11px; font-weight: 700; color: var(--green); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .level1-cta h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .level1-cta p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

    .welcome-hero { text-align: center; padding: 20px 0 36px; }
    .welcome-hero .badge {
      display: inline-block;
      background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3);
      color: var(--accent2); font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 999px; margin-bottom: 20px;
    }
    .welcome-hero h1 { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1.25; margin-bottom: 14px; }
    @media (min-width: 480px) { .welcome-hero h1 { font-size: 36px; } }
    .welcome-hero .sub { font-size: 15px; color: var(--muted); line-height: 1.65; margin-bottom: 32px; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 32px; }
    .chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 14px;
      font-size: 13px; font-weight: 500; color: var(--muted);
    }
    .chip span { color: var(--text); font-weight: 700; }

    .spinner-wrap { text-align: center; padding: 40px 0; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Home Project AI</div>
    <div class="timer-badge">⏱ ~60 секунд</div>
  </div>

  <div id="app">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div style="color:var(--muted);font-size:13px">Загрузка…</div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════
// КОЭФФИЦИЕНТЫ — из config/calc-coefficients.json
// Калькулятор загружает актуальный конфиг с ./calc-coefficients.html
// (тот же GitHub Pages origin). При недоступности — встроенный fallback.
// Для обновления без релиза: переопубликуй calc-coefficients.html.
// ═══════════════════════════════════════════════════════════════
const BUILT_IN_CONFIG = {
  avgSalaryRub: 120000,
  reactivateCoef: 0.025,
  niche: {
    appliances: { label: "Бытовая техника",  autoCoef: 0.40 },
    plumbing:   { label: "Сантехника",        autoCoef: 0.38 },
    lighting:   { label: "Свет / освещение",  autoCoef: 0.36 },
    tiles:      { label: "Плитка",            autoCoef: 0.33 },
    furniture:  { label: "Мебель",            autoCoef: 0.42 },
    wallpaper:  { label: "Обои",              autoCoef: 0.35 },
    other:      { label: "Другое ТНП",        autoCoef: 0.37 }
  },
  revenue: {
    lt3:       { label: "до 3 млн \u20bd/мес",      valueMln: 2   },
    "3to10":   { label: "3\u201310 млн \u20bd/мес",     valueMln: 6   },
    "10to30":  { label: "10\u201330 млн \u20bd/мес",    valueMln: 20  },
    "30to100": { label: "30\u2013100 млн \u20bd/мес",   valueMln: 65  },
    gt100:     { label: "более 100 млн \u20bd/мес", valueMln: 150 }
  },
  team: {
    "1to2":  { label: "1\u20132 чел.",  avgSize: 1.5 },
    "3to5":  { label: "3\u20135 чел.",  avgSize: 4   },
    "6to15": { label: "6\u201315 чел.", avgSize: 10  },
    gt16:    { label: "16+ чел.",       avgSize: 20  }
  },
  kpMonth: {
    lt20:       { label: "менее 20 КП",   kpCoef: 0.03 },
    "20to100":  { label: "20\u2013100 КП",    kpCoef: 0.05 },
    "100to500": { label: "100\u2013500 КП",   kpCoef: 0.07 },
    gt500:      { label: "более 500 КП",  kpCoef: 0.09 }
  },
  competitors: {
    manual:    { label: "Да, вручную (Excel/таблицы)", gapCoef: 0.02 },
    automated: { label: "Да, используем инструменты",  gapCoef: 0.01 },
    none:      { label: "Нет, не отслеживаем",         gapCoef: 0.03 }
  },
  tariffs: [
    { id:"start",     name:"Старт",    star:false, monthly:14900,  implementation:79000,
      skuLimit:1000,  agents:1,    condition:{ maxTeamAvg:2,  maxRevenueMln:10  } },
    { id:"business",  name:"Бизнес",   star:false, monthly:34900,  implementation:149000,
      skuLimit:5000,  agents:3,    condition:{ maxTeamAvg:5,  maxRevenueMln:30  } },
    { id:"pro",       name:"Про \u2605", star:true, monthly:69900, implementation:299000,
      skuLimit:null,  agents:10,   condition:{ maxTeamAvg:15, maxRevenueMln:100 } },
    { id:"corporate", name:"Корпорат", star:false, monthly:129900, implementation:500000,
      skuLimit:null,  agents:null, condition:{ maxTeamAvg:null, maxRevenueMln:null } }
  ]
};

let CFG = BUILT_IN_CONFIG;

let state = {
  step: 'welcome',
  answers: { niche:'', revenue:'', team:'', kpMonth:'', competitors:'' },
  email: { name:'', email:'', gdpr: false },
  results: null,
  sent: false
};

// ─── HELPERS ────────────────────────────────────────────────
const fmt = n => n >= 1000000
  ? (n/1000000).toFixed(1).replace(/\.0$/,'') + ' млн'
  : n >= 1000 ? Math.round(n/1000) + ' тыс' : String(Math.round(n));

const fmtFull = n => new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' \u20bd';

function selectTariff(tariffs, teamAvg, revenueMln) {
  for (const t of tariffs) {
    if (t.condition.maxTeamAvg === null) return t;
    if (teamAvg <= t.condition.maxTeamAvg && revenueMln < t.condition.maxRevenueMln) return t;
  }
  return tariffs[tariffs.length - 1];
}

function calculate() {
  const { niche, revenue, team, kpMonth, competitors } = state.answers;
  const nd = CFG.niche[niche] ?? CFG.niche.other;
  const rv = CFG.revenue[revenue];
  const tm = CFG.team[team];
  const kp = CFG.kpMonth[kpMonth];
  const cp = CFG.competitors[competitors];

  if (!rv || !tm || !kp || !cp) return { error: true };

  const teamSize   = tm.avgSize;
  const revenueMln = rv.valueMln;

  const econFOT      = teamSize * CFG.avgSalaryRub * nd.autoCoef;
  const revenueCoef  = kp.kpCoef + CFG.reactivateCoef + cp.gapCoef;
  const revenueBoost = revenueMln * 1000000 * revenueCoef;

  if (!isFinite(econFOT) || econFOT < 0)       return { error: true };
  if (!isFinite(revenueBoost) || revenueBoost < 0) return { error: true };
  if (econFOT + revenueBoost > 10000000000)     return { error: true };

  const tariff     = selectTariff(CFG.tariffs, teamSize, revenueMln);
  const netMonthly = econFOT + revenueBoost - tariff.monthly;
  const ocupDays   = econFOT > 0 ? Math.round(tariff.implementation * 30 / econFOT) : null;

  return { econFOT, revenueBoost, netMonthly, tariff, ocupDays };
}

// ─── WEBHOOK ────────────────────────────────────────────────
const LEAD_ENDPOINT = 'https://80.91.86.53.nip.io/api/calc-lead';

function sendLead(name, email) {
  const r = state.results;
  const answers = JSON.stringify({
    ...state.answers,
    calcResults: r && !r.error ? {
      econFOT: Math.round(r.econFOT),
      revenueBoost: Math.round(r.revenueBoost),
      tariffId: r.tariff && r.tariff.id
    } : {}
  });

  // Попытка 1: JSON POST с CORS
  fetch(LEAD_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, source: 'calc-l0', answers })
  }).catch(() => {
    // Попытка 2: form-encoded no-cors (simple request — приходит в любом случае)
    const fd = new URLSearchParams();
    fd.append('name', name); fd.append('email', email);
    fd.append('source', 'calc-l0'); fd.append('answers', answers);
    fetch(LEAD_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: fd.toString()
    }).catch(() => {});
  });
}

// ─── RENDER ─────────────────────────────────────────────────
const $el = id => document.getElementById(id);
const appEl = document.getElementById('app');

function renderProgress(step) {
  const qi = ['q1','q2','q3','q4','q5','email'];
  const idx = qi.indexOf(step);
  if (idx < 0) return '';
  const pct = Math.round(((idx+1)/7)*100);
  return `<div class="progress-wrap">
    <div class="progress-label">
      <span>${idx < 5 ? 'Вопрос '+(idx+1)+' из 5' : 'Почти готово'}</span>
      <span>${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

function renderWelcome() {
  return `<div class="welcome-hero">
    <div class="badge">&#9889; Займёт ~60 секунд</div>
    <h1>Сколько стоит рутина вашей команды?</h1>
    <p class="sub">5 вопросов — и вы увидите, сколько AI-автоматизация<br>
      сэкономит в месяц именно для вашего бизнеса.<br>
      Без регистрации. Точность ±30%.</p>
    <div class="welcome-chips">
      <div class="chip">&#127962; <span>Ниша ТНП</span></div>
      <div class="chip">&#128176; <span>Оборот</span></div>
      <div class="chip">&#128101; <span>Команда</span></div>
      <div class="chip">&#128203; <span>КП в месяц</span></div>
      <div class="chip">&#128269; <span>Конкуренты</span></div>
    </div>
    <button class="btn btn-primary" style="width:100%;font-size:17px;padding:18px" onclick="go('q1')">
      Начать расчёт &#8594;
    </button>
  </div>`;
}

function renderQ1() {
  const niches = Object.entries(CFG.niche);
  const cur = state.answers.niche;
  return `${renderProgress('q1')}
  <div class="card">
    <div class="q-number">Вопрос 1 из 5</div>
    <div class="q-title">Какая у вас ниша?</div>
    <div class="select-wrap">
      <select id="sel-niche" onchange="state.answers.niche=this.value;renderStep()">
        <option value="">&#8212; Выберите нишу &#8212;</option>
        ${niches.map(([k,v])=>`<option value="${k}"${cur===k?' selected':''}>${v.label}</option>`).join('')}
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="go('welcome')">&#8592; Назад</button>
      <button class="btn btn-primary" onclick="advance('q1','q2')"${cur?'':' disabled'}>Далее &#8594;</button>
    </div>

function renderResults() {
  const r = state.results;
  if (!r || r.error) {
    return `<div class="card" style="text-align:center">
      <div style="font-size:40px;margin-bottom:16px">&#129300;</div>
      <h2 style="margin-bottom:8px">Недостаточно данных</h2>
      <p style="color:var(--muted);margin-bottom:24px">Пожалуйста, проверьте ответы и попробуйте ещё раз.</p>
      <button class="btn btn-primary" onclick="go('q1')">&#8592; Начать заново</button>
    </div>`;
  }

  const t = r.tariff;
  const skuLabel  = t.skuLimit ? 'до '+new Intl.NumberFormat('ru-RU').format(t.skuLimit)+' SKU' : 'без лимита';
  const agLbl     = t.agents   ? t.agents+' агент'+(t.agents>1?'а':'')                        : 'без лимита';

  return `<div class="results-header">
    <h2>&#128202; Ваш расчёт готов</h2>
    <div class="sub">Оценка по средним рынка ТНП · точность ±30%</div>

  <div class="metrics-grid">
    <div class="metric">
      <div class="metric-icon">&#128184;</div>

    </div>
    <div class="metric">
      <div class="metric-icon">&#128200;</div>
      <div class="metric-value accent">${fmt(r.revenueBoost)} &#8381;</div>
      <div class="metric-label">Прирост выручки<br>в месяц</div>
    </div>
    <div class="metric green-card">
      <div class="metric-icon">&#127919;</div>
      <div class="metric-value green">${fmtFull(Math.max(0, r.netMonthly))}</div>
      <div class="metric-label">Чистая выгода в месяц<br>(за вычетом подписки)</div>
    </div>
    <div class="metric highlight">
      <div class="metric-icon">&#9889;</div>
      <div class="metric-value accent">${r.ocupDays ? r.ocupDays+' дней' : '&lt; 1 мес'}</div>
      <div class="metric-label">Окупаемость<br>внедрения</div>
    </div>
  </div>

  <div class="tariff-box">
    <div class="tariff-name">Рекомендованный тариф</div>
    <div class="tariff-title">${t.name}</div>
    <div class="tariff-price">
      <span class="amount">${new Intl.NumberFormat('ru-RU').format(t.monthly)} &#8381;</span>
      <span class="period">/мес</span>
    </div>
    <div class="tariff-impl">Разовое внедрение: ${new Intl.NumberFormat('ru-RU').format(t.implementation)} &#8381;</div>
    <div class="tariff-tags">
      <span class="tag">${skuLabel}</span>
      <span class="tag">${agLbl}</span>
      ${t.star ? '<span class="tag">Популярный</span>' : ''}
    </div>
  </div>

  <div class="pilot-banner">
    <div class="pilot-icon">&#127873;</div>
    <div>
      <div class="pilot-text">45 дней бесплатного пилота</div>
      <div class="pilot-sub">Без карты · Без обязательств · Запуск за 3 дня</div>
    </div>
  </div>

  <div class="disclaimer">
    &#9888;&#65039; Оценка по средним рынка ТНП (техника, сантехника, мебель, свет, плитка, обои), точность ±30%.<br>
    Реальные цифры зависят от ниши, структуры бизнеса и зрелости процессов.
  </div>

  <div class="level1-cta">

      Вы получите PDF-отчёт с топ-5 точками внедрения AI и roadmap на 3 фазы.</p>
    <button class="btn btn-cta" onclick="alert('Уровень 1 в разработке \u2014 мы уведомим вас, как только будет готов!')">
      Перейти к детальному анализу &#8594;

  <div style="text-align:center;margin-top:24px">

// ─── NAVIGATION ─────────────────────────────────────────────
function renderStep() {
  const s = state.step;
  let html = '';
  if      (s==='welcome') html = renderWelcome();
  else if (s==='q1')      html = renderQ1();
  else if (s==='q2')      html = renderQ2();
  else if (s==='q3')      html = renderQ3();
  else if (s==='q4')      html = renderQ4();
  else if (s==='q5')      html = renderQ5();
  else if (s==='email')   html = renderEmail();
  else if (s==='results') html = renderResults();
  appEl.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function go(step)    { state.step = step; renderStep(); }
function pick(f, v)  { state.answers[f] = v; renderStep(); }

function advance(from, to) {
  const FM = { q1:'niche', q2:'revenue', q3:'team', q4:'kpMonth', q5:'competitors' };
  if (FM[from] && !state.answers[FM[from]]) return;
  go(to);
}

function submitEmail() {
  const emailEl  = $el('inp-email');
  const gdprEl   = $el('gdpr-cb');
  const emailErr = $el('email-err');
  const gdprErr  = $el('gdpr-err');
  let ok = true;

  state.email.name  = $el('inp-name').value.trim();
  state.email.email = emailEl.value.trim();
  state.email.gdpr  = gdprEl.checked;

  if (!state.email.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.email.email)) {
    emailEl.classList.add('error');
    emailErr.classList.add('visible');
    ok = false;
  }
  if (!state.email.gdpr) {
    gdprErr.classList.add('visible');
    ok = false;
  }
  if (!ok) return;

  state.results = calculate();

  if (!state.sent) {
    sendLead(state.email.name, state.email.email);
    state.sent = true;
  }

  go('results');
}

// ─── INIT ───────────────────────────────────────────────────
(async () => {
  try {
    // Загружаем конфиг с того же GitHub Pages origin — без CORS
    const res = await fetch('./calc-coefficients.html', { cache: 'no-cache' });
    if (res.ok) {
      const text = await res.text();
      const parsed = JSON.parse(text);
      if (parsed && parsed.tariffs && Array.isArray(parsed.tariffs) && parsed.tariffs.length > 0) {
        CFG = parsed;
      }
    }
  } catch (_) {
    // Используем встроенный fallback — нормальная ситуация
  }

  if (!CFG || !CFG.niche || !CFG.tariffs) {
    appEl.innerHTML = '<div class="card" style="text-align:center"><div style="font-size:32px;margin-bottom:16px">&#9888;&#65039;</div><h2>Ошибка конфигурации</h2><p style="color:var(--muted);margin-top:8px">Не удалось загрузить настройки калькулятора. Попробуйте обновить страницу.</p></div>';
    return;
  }

  renderStep();
})();
</script>
