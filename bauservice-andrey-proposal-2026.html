<script>const tot=35;const slides=[{cls:"s-navy",title:"А. Ботьев",subtitle:"Ответ на оффер и предложение по развитию BauService",layout:"title-slide"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">Контекст встречи</h2><p style="font-size:18px;line-height:1.6;margin-bottom:16px"><strong>Задача:</strong> обсудить возможность интеграции Homeproject как поставщика встраиваемой техники для проектов BauService</p><p style="font-size:18px;line-height:1.6;margin-bottom:16px"><strong>Статус:</strong> вы получили оффер на поставку техники V-ZUG, Bora, Küppersbusch по специальной программе для архитекторов и дизайнеров</p><p style="font-size:18px;line-height:1.6"><strong>Ожидание:</strong> ясность на счёт взаимной выгоды и механики сотрудничества</p>`,layout:"content"},{cls:"s-blue",title:"Кто такой Homeproject",subtitle:"Через призму BauService",layout:"title-slide"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">Сегмент дистрибуции</h2><p style="font-size:18px;line-height:1.6;margin-bottom:20px">Дистрибьютор (не агент) встраиваемой техники премиум-класса:</p><ul style="font-size:18px;line-height:2;margin-left:24px"><li><strong>V-ZUG</strong> (Швейцария) — лидер гостеприимства</li><li><strong>Bora</strong> (Австрия) — лидер вытяжек, циклонные вентсистемы</li><li><strong>Küppersbusch</strong> (Германия) — аппетит к премиальным варочным поверхностям</li><li><strong>Fhiaba</strong> (Италия) — холодильники дизайнерского уровня</li><li><strong>Schulthess</strong> и другие — специализированная техника</li></ul><p style="font-size:18px;line-height:1.6;margin-top:20px"><em>Всё это живёт на <u>homeproject.online</u> с ценами, каталогами и КП</em></p>`,layout:"content"},{cls:"s-teal",title:"Мой ответ на оффер",subtitle:"Структурированно",layout:"title-slide"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№1. Да, интересно</h2><p style="font-size:18px;line-height:1.8;margin-bottom:16px">BauService = перспективный клиент:</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:16px"><li>Вы работаете с архитекторами и дизайнерами — мой целевой сегмент</li><li>Вы готовы рекомендовать технику в проекты — это источник спроса</li><li>Вы кешируете интерес через квалифицированные КП — это экономит мне труд на прогрев</li></ul><p style="font-size:18px;line-height:1.8"><strong>Вывод:</strong> я готов выстроить механику, которая даст вам комфортную маржу и хорошие скорости.</p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№2. Но не по этому оффену</h2><p style="font-size:18px;line-height:1.8">Предложенные условия:</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:16px"><li>Скидка N% от РРЦ</li><li>Минимальный заказ за расчёт</li><li>«Стандартная» отсрочка 30 дн</li></ul><p style="font-size:18px;line-height:1.8;"><strong>Почему это не работает для вас:</strong></p><ul style="font-size:18px;line-height:2;margin-left:24px"><li>Маржа < 15% — вы в убыток за наши услуги</li><li>Минимум блокирует пилоты и тесты</li><li>30 дн отсрочка = ваши деньги виснут, пока проект не сдан (3-6 мес)</li></ul>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№3. Что я предлагаю вместо</h2><p style="font-size:18px;line-height:1.8;margin-bottom:16px"><strong>Модель «Партнёр дизайна»:</strong></p><table style="width:100%;font-size:17px;border-collapse:collapse;margin-bottom:20px"><tr style="border-bottom:1px solid rgba(255,255,255,.2)"><td style="padding:12px;text-align:left;font-weight:600">Параметр</td><td style="padding:12px;text-align:center;font-weight:600">Ваше улучшение</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">Маржа за КП</td><td style="padding:12px;text-align:center"><strong>18-22%</strong> (вы рекомендуете, я исполняю)</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">Минимум</td><td style="padding:12px;text-align:center"><strong>Нет</strong> (даже 1 вещь за полной КП)</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">Отсрочка</td><td style="padding:12px;text-align:center"><strong>Факт +30</strong> (только после КП→заказ)</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">Поддержка</td><td style="padding:12px;text-align:center"><strong>Мой гарант</strong> вплоть до монтажа</td></tr></table><p style="font-size:16px;line-height:1.6;color:rgba(255,255,255,.8)"><em>Механика: вы присылаете КП с требованиями → я выстраиваю техникум → вы согласуете с клиентом → заказ → факт поставки → факт оплаты (30 дн)</em></p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№4. Зачем это выгодно вам (мой взгляд)</h2><ul style="font-size:18px;line-height:2;margin-left:24px"><li><strong>Маржа</strong> — 18-22% едят ваши услуги, а не убыток</li><li><strong>Скорость</strong> — нет согласования с поставщиком, я вся логистика</li><li><strong>Репутация</strong> — в проекте живёт техника, которую вы рекомендовали; до монтажа я отвечаю за её здоровье</li><li><strong>Спокойствие</strong> — нет минимумов, нет подвешенного денег; заказ = гарант</li><li><strong>Масштаб</strong> — чем больше КП, тем выше скидки на бренды (выигрыш на объёме)</li></ul>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№5. Как это работает технически</h2><ol style="font-size:18px;line-height:2.4;margin-left:24px"><li><strong>Вы отправляете КП</strong> — список помещений, требования по технике (плита, вытяжка, холодильник)</li><li><strong>Я отправляю ответ</strong> — ТТХ, размеры, цвета, цены (по вашей бизнес-модели 18-22%)</li><li><strong>Вы согласуете с заказчиком</strong> — скорее всего примет, редко просит альтернативу</li><li><strong>Заказ</strong> — вы присылаете ПО, я готовлю поставку (1-2 недели на импорт)</li><li><strong>Доставка</strong> — я координирую, вы встречаете; дальше ваш монтажник</li><li><strong>Гарант</strong> — я стою позади техники (брак, гарантия, замена) вплоть до сдачи проекта</li></ol>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№6. Что я выигрываю (честно)</h2><ul style="font-size:18px;line-height:2;margin-left:24px"><li><strong>Потребители:</strong> архитекторы и дизайнеры ценят качество; через вас я получаю квалифицированный спрос</li><li><strong>Объём:</strong> если в месяц 5-10 КП × 4-5 позиций = 20-50 товаров; это чувствуется на скидках у брендов</li><li><strong>Репутация:</strong> в хороших проектах живёт хорошая техника — это мой имиджевый капитал</li><li><strong>Retention:</strong> если вы довольны, вы продолжите; экономит деньги на маркетинге</li></ul><p style="font-size:18px;line-height:1.8;margin-top:20px;color:rgba(255,255,255,.8)"><em>Одним словом: я не жажду переиграть вас на скидке; я жажду стабильно работающей цепи.</em></p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№7. Почему именно эти условия</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Маржа 18-22%:</strong> это золотая середина</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>Вы окупаете КП (время дизайнера на спецификацию)</li><li>Вы окупаете мои услуги (я готовлю спеку, координирую, гарантирую)</li><li>Вы зарабатываете; я зарабатываю — обе стороны мотивированы</li></ul><p style="font-size:18px;line-height:1.8"><strong>Никаких минимумов:</strong> потому что вы начинаете пилоты; пилот = 1-3 позиции в проекте</p><p style="font-size:18px;line-height:1.8;margin-top:20px"><strong>Отсрочка только по факту заказа:</strong> иначе я бы вися́л с деньгами за вашей спекуляцией</p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№8. Миф: «Вы переиграете на скидке»</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Правда:</strong> мне дороже свой PR, чем экономия 2% на скидке.</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>Если я вас переиграю, вы бросите (потеря 50-100K в год)</li><li>Если вы рекомендуете меня друзьям = +5 новых BauService-ов</li><li>Одна рекомендация стоит дороже, чем вся экономия на скидке</li></ul><p style="font-size:18px;line-height:1.8;"><strong>Вывод:</strong> мой интерес = ваш интерес = прозрачность цен и условий.</p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№9. Как это выглядит с вашей стороны</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px">Сценарий: квартира в ЖК, нужна кухня Т-образная, 3.5м, 10 позиций техники:</p><ol style="font-size:18px;line-height:2.4;margin-left:24px"><li><strong>Вы отправляете КП</strong> мне (план + список)</li><li><strong>Я отвечаю днём</strong> — спеца от Bora, V-ZUG, цены окончательные</li><li><strong>Вы показываете клиенту</strong> (обычно согласует)</li><li><strong>ПО приходит вам</strong> на сумму 450K (10 позиций × 45K средняя)</li><li><strong>Ваш доход</strong> = 450K × 20% = 90K (это при маржe 20%)</li><li><strong>Я достаю технику</strong> (1-2 недели), она едет на объект</li><li><strong>Вы сдаёте проект</strong> — техника живёт; я отвечаю за любые вопросы ДО сдачи</li><li><strong>Вы платите мне</strong> в течение месяца со дня поставки</li></ol>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№10. Практический вопрос: ваши цели</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px">Чтобы я и вы говорили об одном:</p><ul style="font-size:18px;line-height:2;margin-left:24px"><li>Вы хотите заработать на рекомендации техники? <strong>(да/нет)</strong></li><li>Вы хотите избежать логистики и гарантии? <strong>(да/нет)</strong></li><li>Вы хотите работать со скоростью (ответ в день)? <strong>(да/нет)</strong></li><li>Вы готовы порекомендовать меня если вы довольны? <strong>(да/нет)</strong></li></ul><p style="font-size:18px;line-height:1.8;margin-top:20px;color:rgba(255,255,255,.8)"><em>Если всё да — мы синхронны; если нет к какому-то пункту — поговорим подробнее</em></p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№11. Бренды, которые я рекомендую</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;font-size:17px;line-height:1.8"><div><strong>V-ZUG</strong><br>Варочные, микроволновки, духовки (Швейцария — надёжность)</div><div><strong>Bora</strong><br>Вытяжки циклонные, вентсистемы (Австрия — золотой стандарт)</div><div><strong>Küppersbusch</strong><br>Варочные, духовки, всё для готовки (Германия — аппетит)</div><div><strong>Fhiaba</strong><br>Холодильники дизайнерские (Италия — отдельная статья про холод)</div><div><strong>Schulthess</strong><br>Посудомойки, специальные устройства</div><div><strong>ILVE</strong><br>Профессиональные серии, кухни нарезные</div></div><p style="font-size:16px;line-height:1.6;margin-top:20px;color:rgba(255,255,255,.8)"><em>Все на homeproject.online с фото, спеками, доступностью и финальной ценой</em></p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№12. Типовой сценарий по времени</h2><table style="width:100%;font-size:16px;border-collapse:collapse"><tr style="border-bottom:1px solid rgba(255,255,255,.2)"><td style="padding:12px;font-weight:600">День</td><td style="padding:12px;font-weight:600">Что происходит</td><td style="padding:12px;font-weight:600">Кто действует</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">0</td><td style="padding:12px">КП с требованиями</td><td style="padding:12px">Вы → я</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">1 (день)</td><td style="padding:12px">Ответ со спеками, ценами</td><td style="padding:12px">Я → вы</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">2-5</td><td style="padding:12px">Согласование с заказчиком</td><td style="padding:12px">Вы + заказчик</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">6</td><td style="padding:12px">ПО к нам</td><td style="padding:12px">Вы → я</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">7-14</td><td style="padding:12px">Заказ у производителей, доставка на склад</td><td style="padding:12px">Я</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">14-21</td><td style="padding:12px">Технолог объект, стой на месте</td><td style="padding:12px">Я + ваш монтажник</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">22-60</td><td style="padding:12px">Гарант техники до сдачи проекта</td><td style="padding:12px">Я</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">61</td><td style="padding:12px">Платёж мне (факт + 30 дн)</td><td style="padding:12px">Вы → я</td></tr></table>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№13. О пилотах и первых проектах</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Первый проект = самый рискованный для обе сторон.</strong> Поэтому:</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>Я не требую минимума (даже 1 вещь)</li><li>Я согласен на пилот-доставку (без гарантии скидок на объём)</li><li>Я предлагаю помощь на всех этапах (спека, дизайн, монтаж-поддержка)</li></ul><p style="font-size:18px;line-height:1.8;margin-top:20px"><strong>Если первый проект пройдёт хорошо:</strong> второй, третий работают по полной программе (маржа, скорость, гарант).</p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№14. Вопрос о мобильности</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Где вы находитесь?</strong> Я в Москве; если вы в Мо-области или другом регионе — это меняет логистику (время, затраты).</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>Если вы в Москве → я могу присутствовать на объекте лично</li><li>Если вы в регионе → я координирую через курьера, видеосвязь</li></ul><p style="font-size:18px;line-height:1.8;"><strong>Вопрос:</strong> где сосредоточены ваши проекты?</p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№15. Об аванса и гарантиях</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Авнас:</strong> я беру 30% от суммы заказа при ПО (чтобы выстроить поставку у брендов)</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>Если вы отмените заказ до доставки → 30% страховка на мои убытки</li><li>Если заказ пошёл в производство → изменения только дорогостоящие (переделка спеки)</li></ul><p style="font-size:18px;line-height:1.8;margin-top:20px"><strong>Гарантия:</strong> все товары под производственной гарантией (1-2 года) + расширенная сервисная поддержка</p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№16. Почему я не берусь за «массовку»</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px">В интернете я вижу партнёров, которые обещают:</p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>30% скидку на все бренды «для всех»</li><li>Минимум 500K в месяц</li><li>Отсрочку 60 дн</li></ul><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Правда:</strong> это ловушка. Я не беру таких условий, потому что:</p><ul style="font-size:18px;line-height:2;margin-left:24px"><li>30% скидка = они получат её только если заказ >5M в год</li><li>Минимум 500K = фильтр: они отсеивают малеьких партнёров</li><li>Отсрочка 60 дн = деньги подвешены, партнёр начнёт жаловаться</li></ul>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№17. Мой гарант — это не юридический договор</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Гарант = я встаю за технику.</strong></p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>Брак? Я меняю, я координирую возврат</li><li>Монтаж сложный? Я рекомендую монтажника, я консультирую</li><li>Техника не подходит в проём? Я помогаю найти альтернативу</li></ul><p style="font-size:18px;line-height:1.8;"><strong>Зачем мне это?</strong> Потому что если в хорошем проекте живёт плохая техника, это мой убыток. Лучше я помогу, чем потеряю вас как партнёра.</p>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">№18. Как связаться и что дальше</h2><p style="font-size:18px;line-height:1.8;margin-bottom:20px"><strong>Контакты:</strong></p><ul style="font-size:18px;line-height:2;margin-left:24px;margin-bottom:20px"><li>Telegram: <a href="https://t.me/alexeybronitsky" style="color:#3B82F6;text-decoration:underline">@alexeybronitsky</a></li><li>Email: <a href="mailto:hello@homeproject.online" style="color:#3B82F6;text-decoration:underline">hello@homeproject.online</a></li><li>Сайт: <a href="https://homeproject.online" style="color:#3B82F6;text-decoration:underline">homeproject.online</a> (каталог, ценовая база)</li></ul><p style="font-size:18px;line-height:1.8;margin-top:20px"><strong>Что дальше?</strong></p><ol style="font-size:18px;line-height:2.4;margin-left:24px"><li>Вы ответите на 4 вопроса из слайда №10 (выше)</li><li>Мы договариваемся о деталях (маржа точно, отсрочка, условия первого проекта)</li><li>Я показываю вам каталог и цены на homeproject.online</li><li>Вы отправляете первую КП</li><li>Я отвечаю в день</li></ol>`,layout:"content"},{cls:"s-navy",title:"Спасибо",subtitle:"За внимание и время",layout:"title-slide"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">Приложение: уточнения по бренду</h2><div style="margin-bottom:20px"><p style="font-size:18px;font-weight:600;margin-bottom:8px">V-ZUG (Швейцария)</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">Премиум-класс встраиваемой техники. Духовки, микроволны, индукция. Огромное разнообразие размеров и цветов. Цена выше среднего, но репутация стоит.</p></div><div style="margin-bottom:20px"><p style="font-size:18px;font-weight:600;margin-bottom:8px">Bora (Австрия)</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">Вытяжки и вентсистемы — мировой лидер. Их циклонные вытяжки (без угля) стоят дороже, но работают 10+ лет. Дизайнеры их обожают.</p></div><div style="margin-bottom:20px"><p style="font-size:18px;font-weight:600;margin-bottom:8px">Küppersbusch (Германия)</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">Варочные поверхности газовые, индукционные; духовки с датчиками температуры. Среднее ценообразование, хорошее качество.</p></div><div><p style="font-size:18px;font-weight:600;margin-bottom:8px">Fhiaba (Италия)</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">Холодильники с дизайнерскими фасадами, цветные, встраиваемые. Они для выставочных кухонь, премиальных квартир. Дорого, но стоит.</p></div>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">Приложение: часто задаваемые вопросы</h2><div style="margin-bottom:20px"><p style="font-size:18px;font-weight:600;margin-bottom:8px">Q: А что если техника не подойдёт в размер?</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">A: Я знаю размеры всех моделей; перед заказом я проверю проект и скажу, «подходит/не подходит». Если после доставки не подходит — я помогу вернуть, обработать скидку, найти альтернативу.</p></div><div style="margin-bottom:20px"><p style="font-size:18px;font-weight:600;margin-bottom:8px">Q: Можно ли вернуть технику?</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">A: Если брак — без вопросов. Если просто передумали — обсуждаем; обычно я беру товар обратно, но с комиссией (5-10%).</p></div><div style="margin-bottom:20px"><p style="font-size:18px;font-weight:600;margin-bottom:8px">Q: Какие условия для постоянных партнёров?</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">A: После 5-10 проектов в год маржа растёт (до 25%); я делаю лучше цены на большие заказы; я учу вас брендам и помогаю придумывать техники.</p></div><div><p style="font-size:18px;font-weight:600;margin-bottom:8px">Q: Вы работаете с другими дизайн-студиями?</p><p style="font-size:17px;line-height:1.6;color:rgba(255,255,255,.85)">A: Да, но я не конкурирую с вами. Каждый партнёр — независим. Я работаю с 10+ студиями; чем больше вас, тем больше мне объёмов, тем выше скидки у брендов.</p></div>`,layout:"content"},{cls:"s-dark",content:`<h2 style="font-size:32px;margin-bottom:20px;font-weight:600">Приложение: ценовой примеры</h2><table style="width:100%;font-size:16px;border-collapse:collapse;margin-bottom:20px"><tr style="border-bottom:1px solid rgba(255,255,255,.2)"><td style="padding:12px;font-weight:600">Бренд</td><td style="padding:12px;font-weight:600;text-align:center">Модель</td><td style="padding:12px;font-weight:600;text-align:right">РРЦ (₽)</td><td style="padding:12px;font-weight:600;text-align:right">Для вас (20% маржа)</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">V-ZUG</td><td style="padding:12px">Духовка 60cm</td><td style="padding:12px;text-align:right">180,000</td><td style="padding:12px;text-align:right">144,000</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">Bora</td><td style="padding:12px">Вытяжка циклонная 90cm</td><td style="padding:12px;text-align:right">240,000</td><td style="padding:12px;text-align:right">192,000</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">Küppersbusch</td><td style="padding:12px">Варочная поверхность 90cm</td><td style="padding:12px;text-align:right">120,000</td><td style="padding:12px;text-align:right">96,000</td></tr><tr style="border-bottom:1px solid rgba(255,255,255,.1)"><td style="padding:12px">Fhiaba</td><td style="padding:12px">Холодильник 90cm</td><td style="padding:12px;text-align:right">320,000</td><td style="padding:12px;text-align:right">256,000</td></tr></table><p style="font-size:16px;line-height:1.6;color:rgba(255,255,255,.8)"><em>Ваша маржа = цена для вас × 20% = ваш доход за КП</em></p>`,layout:"content"},{cls:"s-navy",title:"Спасибо",subtitle:"Жду вашего ответа",layout:"title-slide"}];function render(){const slidesDiv=document.getElementById("slides");slidesDiv.innerHTML="";slides.forEach((s,i)=>{const d=document.createElement("div");d.className=`slide ${s.cls}`;let html="";if(s.layout==="title-slide"){html=`<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;text-align:center;padding:40px"><h1 style="font-size:64px;margin-bottom:20px;font-weight:700">${s.title}</h1><p style="font-size:36px;font-weight:300;color:rgba(255,255,255,.8)">${s.subtitle}</p></div>`}else{html=`<div style="padding:60px;display:flex;flex-direction:column;justify-content:center;height:100%">${s.content}</div>`}d.innerHTML=html;slidesDiv.appendChild(d)});slides[0].dom=slidesDiv.children[0];slides[0].dom.classList.add("active")}let cur=0;function show(n){slides[cur].dom.classList.remove("active");cur=(n+slides.length)%slides.length;slides[cur].dom.classList.add("active");document.getElementById("counter").textContent=`${cur+1}/${tot}`;const prog=document.getElementById("prog");prog.style.width=`${(cur+1)/tot*100}%`}function go(d){show(cur+d)}render();slides.forEach((s,i)=>{s.dom=document.querySelectorAll(".slide")[i]});slides[0].dom.classList.add("active");document.getElementById("next").addEventListener("click",()=>go(1));document.getElementById("prev").addEventListener("click",()=>go(-1));document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1)});document.addEventListener("touchstart",e=>{const x=e.touches[0].clientX;document.addEventListener("touchend",e=>{const d=e.changedTouches[0].clientX-x;if(Math.abs(d)>50)go(d<0?1:-1)});
pr.style.width=(1/tot*100)+'%';
</script>
