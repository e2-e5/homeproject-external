<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>А. Ботьев — Ответ на оффер и предложение по развитию BauService</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"><style>:root{--navy:#0F1F3D;--blue:#1A4B8C;--blue2:#2563EB;--sky:#3B82F6;--teal:#0891B2;--green:#059669;--red:#DC2626;--amber:#D97706;--white:#FFFFFF;--off:#F8F7F4;--g1:#F3F4F6;--g2:#E5E7EB;--g3:#9CA3AF;--dark:#111827;--t2:#374151}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;font-family:'Inter',sans-serif;background:#0A0A0A}.slides{width:100%;height:100vh;overflow:hidden;position:relative}.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s ease}.slide.active{opacity:1;pointer-events:all}.nav{position:fixed;bottom:24px;right:32px;z-index:100;display:flex;align-items:center;gap:10px}.nb{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}.nb:hover{background:rgba(255,255,255,.25)}.nc{font-size:11px;font-weight:600;color:rgba(255,255,255,.45);min-width:36px;text-align:center}.prog{position:fixed;top:0;left:0;height:3px;background:#3B82F6;transition:width .4s ease;z-index:200}.s-navy{background:linear-gradient(135deg,#0F1F3D 0%,#1A3A6B 60%,#0F2B5C 100%);color:white}.s-dark{background:#111827;color:white}.s-blue{background:linear-gradient(135deg,#1E3A8A 0%,#1A4B8C 100%);color:white}.s-teal{background:linear-gradient(135deg,#0C4A6E 0%,#075985 100%);color:white}.s-green{background:linear-gradient(135deg,#064E3B 0%,#065F46 100%);color:white}.s-light{background:#F8F7F4;color:#111827}.s-slate{background:linear-gradient(135deg,#1E293B 0%,#0F172A 100%);color:white}.sh{padding:36px 68px 0;border-bottom:1px solid rgba(255,255,255,.09);padding-bottom:18px;margin-bottom:24px}.sh.light{border-bottom-color:#E5E7EB}.stag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#60A5FA;margin-bottom:5px}.stag.teal{color:#7DD3FC}.stag.green{color:#6EE7B7}.stag.amber{color:#FCD34D}.stag.light{color:#2563EB}.stitle{font-size:26px;font-weight:800;color:white}.stitle.dark{color:#111827}.sb{padding:0 68px;flex:1;display:flex;flex-direction:column;justify-content:center}.sf{padding:12px 68px;font-size:10px;opacity:.2;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between}.sf.light{border-top-color:#E5E7EB;color:#9CA3AF;opacity:1}.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.cd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 18px}.b{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}.br{background:rgba(220,38,38,.15);color:#EF4444;border:1px solid rgba(220,38,38,.3)}.bg{background:rgba(5,150,105,.15);color:#10B981;border:1px solid rgba(5,150,105,.3)}.by{background:rgba(217,119,6,.15);color:#F59E0B;border:1px solid rgba(217,119,6,.3)}.bb{background:rgba(59,130,246,.15);color:#60A5FA;border:1px solid rgba(59,130,246,.3)}</style></head><body><div class="prog" id="prog"></div><div class="slides" id="slides">PRESENTATION CONTENT</div><script>const sls=document.querySelectorAll('.slide');const tot=sls.length;const pr=document.getElementById('prog');const ct=document.getElementById('ct');function goTo(n){sls[cur].classList.remove('active');cur=(n+tot)%tot;sls[cur].classList.add('active');ct.textContent=(cur+1)+' / '+tot;pr.style.width=((cur+1)/tot*100)+'%'}function go(d){goTo(cur+d)}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1)}if(e.key==='ArrowLeft'){e.preventDefault();go(-1)}if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}});let tx=0;document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50)go(d<0?1:-1)});pr.style.width=(1/tot*100)+'%';</script></body></html>
