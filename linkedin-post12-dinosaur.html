<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>LinkedIn Post — Метеорит уже летит</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    background: #0D0D2B;
    font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 628px;
    overflow: hidden;
    background: linear-gradient(160deg, #0D0D2B 0%, #12103A 30%, #1A1A4E 70%, #0F1535 100%);
  }

  /* ---- Dinosaur photo ---- */
  .dino-photo-wrap {
    position: absolute;
    bottom: 0;
    left: -55px;
    width: 490px;
    height: 628px;
    z-index: 5;
    overflow: hidden;
  }

  .dino-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: brightness(0.52) contrast(1.25) saturate(0.8);
  }

  .dino-fade-left {
    position: absolute;
    top: 0; left: 0;
    width: 28%; height: 100%;
    background: linear-gradient(to right, rgba(8,8,30,1) 0%, transparent 100%);
    pointer-events: none;
  }

  .dino-fade-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 40%;
    background: linear-gradient(to top, rgba(5,5,22,1) 0%, transparent 100%);
    pointer-events: none;
  }

  .dino-fade-right {
    position: absolute;
    top: 0; right: 0;
    width: 38%; height: 100%;
    background: linear-gradient(to left, rgba(12,10,38,0.95) 0%, transparent 100%);
    pointer-events: none;
  }

  .dino-meteor-rim {
    position: absolute;
    top: 0; right: 0;
    width: 55%; height: 65%;
    background: radial-gradient(ellipse at top right,
      rgba(255, 90, 0, 0.10) 0%,
      rgba(255, 60, 0, 0.04) 50%,
      transparent 75%);
    pointer-events: none;
  }

  /* ---- Text ---- */
  .headline {
    position: absolute;
    top: 68px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    white-space: nowrap;
  }

  .headline-main {
    display: block;
    font-size: 86px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.0;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow:
      0 0 20px rgba(255,120,0,0.9),
      0 0 50px rgba(255,80,0,0.6),
      0 0 90px rgba(255,60,0,0.35),
      2px 2px 4px rgba(0,0,0,0.8);
  }

  .headline-sub {
    display: block;
    margin-top: 12px;
    font-size: 25px;
    font-weight: 400;
    color: #A8C8FF;
    letter-spacing: 1.5px;
    text-shadow: 0 0 18px rgba(0,200,255,0.5), 1px 1px 3px rgba(0,0,0,0.7);
  }

  .brand {
    position: absolute;
    bottom: 28px;
    left: 36px;
    z-index: 20;
  }

  .brand-name {
    font-size: 18px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }

  .brand-tagline {
    font-size: 11px;
    font-weight: 400;
    color: rgba(168,200,255,0.75);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .friday-badge {
    position: absolute;
    bottom: 28px;
    right: 36px;
    z-index: 20;
    border: 2px solid #FF6B00;
    border-radius: 8px;
    padding: 8px 18px;
    background: rgba(10,8,30,0.85);
    box-shadow: 0 0 12px rgba(255,107,0,0.7), inset 0 0 10px rgba(255,107,0,0.08);
  }

  .friday-text {
    font-size: 16px;
    font-weight: 700;
    color: #FF8C42;
    letter-spacing: 1.5px;
    text-shadow: 0 0 10px rgba(255,107,0,0.9), 0 0 20px rgba(255,107,0,0.5);
    text-transform: uppercase;
  }

  .scene-svg {
    position: absolute;
    inset: 0;
    width: 1200px;
    height: 628px;
  }

  @keyframes meteor-drift {
    0%   { transform: translate(0px, 0px); }
    100% { transform: translate(-8px, 8px); }
  }
  @keyframes tail-pulse {
    0%, 100% { opacity: 0.85; }
    50%       { opacity: 1; }
  }
  @keyframes star-twinkle {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }
  @keyframes city-glow {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1; }
  }

  .meteor-group { animation: meteor-drift 3s ease-in-out infinite alternate; transform-origin: 980px 80px; }
  .meteor-tail  { animation: tail-pulse 2s ease-in-out infinite; }
  .city-windows { animation: city-glow 3.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="canvas">

  <svg class="scene-svg" viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0D0D2B"/>
        <stop offset="60%" stop-color="#13124A"/>
        <stop offset="100%" stop-color="#1A1A4E"/>
      </linearGradient>
      <radialGradient id="meteorCore" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="1"/>
        <stop offset="25%" stop-color="#FFF0CC" stop-opacity="1"/>
        <stop offset="55%" stop-color="#FF8C00" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#FF4400" stop-opacity="0.5"/>
      </radialGradient>
      <linearGradient id="tailGrad" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#FFFFFF"  stop-opacity="0.9"/>
        <stop offset="15%" stop-color="#FFD580"  stop-opacity="0.8"/>
        <stop offset="40%" stop-color="#FF6B00"  stop-opacity="0.6"/>
        <stop offset="70%" stop-color="#CC2200"  stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="tailGrad2" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#FF9900"  stop-opacity="0.5"/>
        <stop offset="50%" stop-color="#FF4400"  stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
      </linearGradient>
      <filter id="meteorGlow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="12" result="blur1"/>
        <feGaussianBlur stdDeviation="5"  result="blur2" in="SourceGraphic"/>
        <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="windowGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <radialGradient id="impactLight" cx="75%" cy="0%" r="80%">
        <stop offset="0%"  stop-color="#FF6600" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#050A1E" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#030710" stop-opacity="1"/>
      </linearGradient>
    </defs>

    <rect width="1200" height="628" fill="url(#skyGrad)"/>
    <rect width="1200" height="628" fill="url(#impactLight)"/>

    <!-- Stars -->
    <circle cx="45"  cy="22"  r="1.8" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="123" cy="58"  r="1.4" fill="#CCE8FF" opacity="0.85"/>
    <circle cx="210" cy="14"  r="1.6" fill="#FFFFFF" opacity="0.90"/>
    <circle cx="305" cy="42"  r="1.2" fill="#E0F0FF" opacity="0.80"/>
    <circle cx="388" cy="18"  r="2.0" fill="#FFFFFF" opacity="1.0"/>
    <circle cx="550" cy="8"   r="1.7" fill="#FFFFFF" opacity="0.92"/>
    <circle cx="700" cy="25"  r="1.3" fill="#FFFFFF" opacity="0.80"/>
    <circle cx="820" cy="18"  r="1.0" fill="#FFFFFF" opacity="0.72"/>
    <circle cx="190" cy="45"  r="1.5" fill="#FFFFFF" opacity="0.9" style="animation: star-twinkle 2.1s ease-in-out infinite;"/>
    <circle cx="502" cy="30"  r="1.6" fill="#CCE8FF" opacity="0.85" style="animation: star-twinkle 3.3s ease-in-out infinite 0.7s;"/>
    <circle cx="355" cy="20"  r="1.2" fill="#FFFFFF" opacity="0.80" style="animation: star-twinkle 2.7s ease-in-out infinite 1.4s;"/>

    <!-- Meteor -->
    <g class="meteor-group">
      <polygon class="meteor-tail" points="968,62 978,72 480,340 440,300" fill="url(#tailGrad2)" opacity="0.5"/>
      <polygon class="meteor-tail" points="970,65 977,70 530,310 515,295" fill="url(#tailGrad)" opacity="0.88"/>
      <polygon class="meteor-tail" points="972,67 975,70 555,298 548,290" fill="url(#tailGrad)" opacity="0.6"/>
      <line x1="960" y1="68" x2="620" y2="240" stroke="#FFD580" stroke-width="1" opacity="0.4"/>
      <circle cx="980" cy="68" r="42" fill="#FF6B00" opacity="0.25" filter="url(#meteorGlow)"/>
      <circle cx="980" cy="68" r="30" fill="#FF8800" opacity="0.40" filter="url(#softGlow)"/>
      <circle cx="980" cy="68" r="22" fill="url(#meteorCore)" filter="url(#meteorGlow)"/>
      <circle cx="977" cy="65" r="9"  fill="#FFFFFF" opacity="0.95"/>

      <circle cx="945" cy="90"  r="3" fill="#FF9900" opacity="0.7" filter="url(#softGlow)"/>
      <circle cx="920" cy="108" r="2" fill="#FFB800" opacity="0.55"/>
      <circle cx="900" cy="122" r="1.5" fill="#FF6600" opacity="0.45"/>
    </g>

    <!-- Ground -->
    <rect x="0" y="525" width="1200" height="103" fill="url(#groundGrad)"/>
    <line x1="0" y1="526" x2="1200" y2="526" stroke="#1A2060" stroke-width="1" opacity="0.6"/>

    <!-- City skyline -->
    <rect x="830" y="360" width="60" height="168" fill="#0C1235" rx="1"/>
    <rect x="830" y="355" width="60" height="8"   fill="#111840" rx="1"/>
    <line x1="860" y1="355" x2="860" y2="320" stroke="#1A2468" stroke-width="2"/>
    <circle cx="860" cy="318" r="3" fill="#FF3333" opacity="0.9" style="animation: star-twinkle 1.2s ease-in-out infinite;"/>
    <rect x="905" y="400" width="75" height="128" fill="#091030" rx="1"/>

    <rect x="730" y="440" width="38"  height="88"  fill="#0C1235" rx="1"/>

    <g class="city-windows" filter="url(#windowGlow)">
      <rect x="837" y="370" width="10" height="8" fill="#00D4FF" opacity="0.9" rx="1"/>
      <rect x="852" y="370" width="10" height="8" fill="#00D4FF" opacity="0.6" rx="1"/>
      <rect x="868" y="370" width="10" height="8" fill="#4488FF" opacity="0.8" rx="1"/>

      <rect x="868" y="390" width="10" height="8" fill="#00D4FF" opacity="0.9" rx="1"/>
      <rect x="837" y="415" width="10" height="8" fill="#00D4FF" opacity="0.7" rx="1"/>
      <rect x="868" y="415" width="10" height="8" fill="#00D4FF" opacity="0.9" rx="1"/>
      <rect x="837" y="440" width="10" height="8" fill="#88BBFF" opacity="0.8" rx="1"/>
      <rect x="852" y="440" width="10" height="8" fill="#4488FF" opacity="0.6" rx="1"/>
      <rect x="913" y="410" width="12" height="8" fill="#00D4FF" opacity="0.85" rx="1"/>
      <rect x="930" y="410" width="12" height="8" fill="#4488FF" opacity="0.60" rx="1"/>
      <rect x="948" y="410" width="12" height="8" fill="#00D4FF" opacity="0.90" rx="1"/>
      <rect x="913" y="430" width="12" height="8" fill="#4488FF" opacity="0.70" rx="1"/>
      <rect x="930" y="430" width="12" height="8" fill="#00D4FF" opacity="0.45" rx="1"/>
      <rect x="948" y="430" width="12" height="8" fill="#00D4FF" opacity="0.80" rx="1"/>

  </svg>

  <!-- Real T-Rex photo (replaces SVG silhouette) -->
  <div class="dino-photo-wrap">
    <img
      class="dino-photo"
      src="https://new.homeproject.online/static/1784901464413-1784901432941-_________1.jpg"

  <div class="headline">

  <div class="brand">

</div>
</body>
